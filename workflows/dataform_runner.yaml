main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: ${args.project_id}
          - region: ${args.region}
          - repository_id: ${args.repository_id}
          - workflow_config_id: ${args.workflow_config_id}
          - poll_seconds: ${default(map.get(args, "poll_seconds"), 20)}
          - max_attempts: ${default(map.get(args, "max_attempts"), 30)}
          - current_attempt: 0
          - service_account: ${args.service_account}
          - repository: ${"projects/" + project_id + "/locations/" + region + "/repositories/" + repository_id}
          - workflow_config: ${repository + "/workflowConfigs/" + workflow_config_id}
          - pubsub_topic_job_summary: ${default(map.get(args, "pubsub_topic_job_summary"), "")}
          - workflow_name: ${sys.get_env("GOOGLE_CLOUD_WORKFLOW_ID")}
          - workflow_start_time: ${sys.now()}

    - createWorkflowInvocation:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1/" + repository + "/workflowInvocations"}
          auth:
            type: OAuth2
          headers:
            Content-Type: application/json
          body:
            workflowConfig: ${workflow_config}
        result: workflowInvocation

    - saveInvocationName:
        assign:
          - invocation_name: ${workflowInvocation.body.name}

    - waitBeforePoll:
        call: sys.sleep
        args:
          seconds: ${poll_seconds}

    - increaseAttempt:
        assign:
          - current_attempt: ${current_attempt + 1}

    - getInvocationStatus:
        call: http.get
        args:
          url: ${"https://dataform.googleapis.com/v1/" + invocation_name}
          auth:
            type: OAuth2
        result: invocationStatus

    - checkTerminalState:
        switch:
          - condition: ${invocationStatus.body.state == "SUCCEEDED"}
            next: setSuccessState
          - condition: ${invocationStatus.body.state == "FAILED"}
            next: setFailedState
          - condition: ${invocationStatus.body.state == "CANCELLED"}
            next: setCancelledState
          - condition: ${current_attempt >= max_attempts}
            next: setTimeoutState
        next: waitBeforePoll

    - setSuccessState:
        assign:
          - final_state: "SUCCEEDED"
        next: captureEndTime

    - setFailedState:
        assign:
          - final_state: "FAILED"
        next: captureEndTime

    - setCancelledState:
        assign:
          - final_state: "CANCELLED"
        next: captureEndTime

    - setTimeoutState:
        assign:
          - final_state: "TIMEOUT"
        next: captureEndTime

    - captureEndTime:
        assign:
          - workflow_end_time: ${sys.now()}
          - pubsub_publish_time: ${sys.now()}
        next: maybePublishFinalSummary

    - maybePublishFinalSummary:
        switch:
          - condition: ${pubsub_topic_job_summary != ""}
            next: buildFinalSummaryMessage
        next: returnOrRaise

    - buildFinalSummaryMessage:
        assign:
          - final_summary_message:
              workflow_name: ${workflow_name}
              workflow_start_time: ${workflow_start_time}
              workflow_end_time: ${workflow_end_time}
              pubsub_publish_time: ${pubsub_publish_time}
        next: publishFinalSummary

    - publishFinalSummary:
        call: googleapis.pubsub.v1.projects.topics.publish
        args:
          topic: ${pubsub_topic_job_summary}
          body:
            messages:
              - data: ${base64.encode(json.encode(final_summary_message))}
        result: pubsubPublishResult
        next: returnOrRaise

    - returnOrRaise:
        switch:
          - condition: ${final_state == "SUCCEEDED"}
            next: returnSuccess
          - condition: ${final_state == "FAILED"}
            next: raiseFailed
          - condition: ${final_state == "CANCELLED"}
            next: raiseCancelled
          - condition: ${final_state == "TIMEOUT"}
            next: raiseTimeout

    - returnSuccess:
        return:
          status: "SUCCESS"
          workflow_name: ${workflow_name}
          invocation_name: ${invocation_name}
          state: ${final_state}
          workflow_start_time: ${workflow_start_time}
          workflow_end_time: ${workflow_end_time}

    - raiseFailed:
        raise: '${"Dataform invocation failed. Invocation: " + invocation_name}'

    - raiseCancelled:
        raise: '${"Dataform invocation cancelled. Invocation: " + invocation_name}'

    - raiseTimeout:
        raise: '${"Dataform invocation polling timed out. Invocation: " + invocation_name}'
