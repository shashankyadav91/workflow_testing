main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: ${args.project_id}
          - region: ${args.region}
          - repository_id: ${args.repository_id}
          - git_commitish: ${args.git_commitish}
          - included_tags: ${default(map.get(args, "included_tags"), [])}
          - poll_seconds: ${default(map.get(args, "poll_seconds"), 20)}
          - max_attempts: ${default(map.get(args, "max_attempts"), 30)}
          - current_attempt: 0
          - service_account: ${args.service_account}
          - repository: ${"projects/" + project_id + "/locations/" + region + "/repositories/" + repository_id}
          - pubsub_topic: ${default(map.get(args, "pubsub_topic"), "")}

    - createCompilationResult:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/" + repository + "/compilationResults"}
          auth:
            type: OAuth2
          headers:
            Content-Type: application/json
          body:
            gitCommitish: ${git_commitish}
        result: compilationResult

    - createWorkflowInvocation:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/" + repository + "/workflowInvocations"}
          auth:
            type: OAuth2
          headers:
            Content-Type: application/json
          body:
            compilationResult: ${compilationResult.body.name}
            invocationConfig:
              includedTags: ${included_tags}
              transitiveDependenciesIncluded: true
              serviceAccount: ${service_account}
        result: workflowInvocation

    - saveInvocationName:
        assign:
          - invocation_name: ${workflowInvocation.body.name}

    - maybePublish:
        switch:
          - condition: ${pubsub_topic != ""}
            next: buildInvocationMessage
        next: waitBeforePoll

    - buildInvocationMessage:
        assign:
          - invocation_message:
              invocation_name: ${invocation_name}

    - publishInvocation:
        call: http.post
        args:
          url: ${"https://pubsub.googleapis.com/v1/" + pubsub_topic + ":publish"}
          auth:
            type: OAuth2
          headers:
            Content-Type: application/json
          body:
            messages:
              - data: ${base64.encode(json.encode(invocation_message))}
        result: pubsubPublish

    - waitBeforePoll:
        call: sys.sleep
        args:
          seconds: ${poll_seconds}

    - increaseAttempt:
        assign:
          - current_attempt: ${current_attempt + 1}

    - getInvocationStatus:
        call: http.get
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/" + invocation_name}
          auth:
            type: OAuth2
        result: invocationStatus

    - checkTerminalState:
        switch:
          - condition: ${invocationStatus.body.state == "SUCCEEDED"}
            next: success
          - condition: ${invocationStatus.body.state == "FAILED"}
            next: failed
          - condition: ${invocationStatus.body.state == "CANCELLED"}
            next: cancelled
          - condition: ${current_attempt >= max_attempts}
            next: timeout
        next: waitBeforePoll

    - success:
        switch:
          - condition: ${pubsub_topic != ""}
            next: buildFinalStatusMessage
        next: returnSuccess

    - buildFinalStatusMessage:
        assign:
          - final_status_message:
              invocation_name: ${invocation_name}
              state: ${invocationStatus.body.state}

    - publishFinalStatus:
        call: http.post
        args:
          url: ${"https://pubsub.googleapis.com/v1/" + pubsub_topic + ":publish"}
          auth:
            type: OAuth2
          headers:
            Content-Type: application/json
          body:
            messages:
              - data: ${base64.encode(json.encode(final_status_message))}
        result: pubsubFinalStatus

    - returnSuccess:
        return:
          status: "SUCCESS"
          invocation_name: ${invocation_name}
          state: ${invocationStatus.body.state}

    - failed:
        switch:
          - condition: ${pubsub_topic != ""}
            next: buildFinalStatusMessageFailed
        next: raiseFailed

    - buildFinalStatusMessageFailed:
        assign:
          - final_status_message:
              invocation_name: ${invocation_name}
              state: ${invocationStatus.body.state}

    - publishFinalStatusFailed:
        call: http.post
        args:
          url: ${"https://pubsub.googleapis.com/v1/" + pubsub_topic + ":publish"}
          auth:
            type: OAuth2
          headers:
            Content-Type: application/json
          body:
            messages:
              - data: ${base64.encode(json.encode(final_status_message))}
        result: pubsubFinalStatusFailed
        next: raiseFailed

    - raiseFailed:
        raise: '${"Dataform invocation failed. Invocation: " + invocation_name}'

    - cancelled:
        switch:
          - condition: ${pubsub_topic != ""}
            next: buildFinalStatusMessageCancelled
        next: raiseCancelled

    - buildFinalStatusMessageCancelled:
        assign:
          - final_status_message:
              invocation_name: ${invocation_name}
              state: ${invocationStatus.body.state}

    - publishFinalStatusCancelled:
        call: http.post
        args:
          url: ${"https://pubsub.googleapis.com/v1/" + pubsub_topic + ":publish"}
          auth:
            type: OAuth2
          headers:
            Content-Type: application/json
          body:
            messages:
              - data: ${base64.encode(json.encode(final_status_message))}
        result: pubsubFinalStatusCancelled
        next: raiseCancelled

    - raiseCancelled:
        raise: '${"Dataform invocation cancelled. Invocation: " + invocation_name}'

    - timeout:
        switch:
          - condition: ${pubsub_topic != ""}
            next: buildFinalStatusMessageTimeout
        next: raiseTimeout

    - buildFinalStatusMessageTimeout:
        assign:
          - final_status_message:
              invocation_name: ${invocation_name}
              state: "TIMEOUT"

    - publishFinalStatusTimeout:
        call: http.post
        args:
          url: ${"https://pubsub.googleapis.com/v1/" + pubsub_topic + ":publish"}
          auth:
            type: OAuth2
          headers:
            Content-Type: application/json
          body:
            messages:
              - data: ${base64.encode(json.encode(final_status_message))}
        result: pubsubFinalStatusTimeout
        next: raiseTimeout

    - raiseTimeout:
        raise: '${"Dataform invocation polling timed out. Invocation: " + invocation_name}'
